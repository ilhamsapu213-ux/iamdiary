<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iamdiary ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
</head>
<body class="bg-blue-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 font-sans transition-colors duration-300">

    <nav class="fixed bottom-0 left-0 w-full md:top-0 md:h-16 bg-white dark:bg-slate-800 border-t md:border-b border-blue-100 dark:border-slate-700 z-50 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-around items-center h-full p-2">
            <button onclick="showPage('home')" class="flex flex-col items-center text-blue-500"><i class="ph ph-house text-2xl"></i><span class="text-[10px]">Beranda</span></button>
            <button onclick="showPage('albums')" class="flex flex-col items-center text-slate-400"><i class="ph ph-folder-notch text-2xl"></i><span class="text-[10px]">Album</span></button>
            <button onclick="openAddModal()" class="bg-blue-500 text-white p-3 rounded-full -mt-8 md:mt-0 shadow-lg hover:scale-105 transition"><i class="ph ph-plus text-xl"></i></button>
            <button onclick="showPage('favs')" class="flex flex-col items-center text-slate-400"><i class="ph ph-heart text-2xl"></i><span class="text-[10px]">Favorit</span></button>
            <button onclick="toggleTheme()" class="flex flex-col items-center text-slate-400"><i class="ph ph-moon text-2xl"></i><span class="text-[10px]">Tema</span></button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 pt-6 pb-24 md:pt-24 min-h-screen">
        <div id="content-home" class="space-y-8">
            <div class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-sm text-center">
                <div class="w-24 h-24 bg-blue-100 dark:bg-blue-900 rounded-full mx-auto mb-4 flex items-center justify-center">
                    <i class="ph ph-book-open-text text-4xl text-blue-500"></i>
                </div>
                <h1 class="text-3xl font-bold text-blue-600 dark:text-blue-400">Selamat Datang di iamdiary</h1>
                <p class="mt-4 text-slate-600 dark:text-slate-300 max-w-lg mx-auto">
                    Tempat aman untuk menyimpan setiap kepingan momen berharga. Ceritakan kisahmu, simpan fotomu, dan abadikan setiap detail perjalanan hidupmu di sini.
                </p>
                <div class="flex justify-center gap-6 mt-8">
                    <div class="text-center">
                        <span id="album-count" class="block text-2xl font-bold text-blue-500">0</span>
                        <span class="text-xs text-slate-400">Total Album</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-gallery" class="hidden">
            <h1 id="page-title" class="text-3xl font-bold text-blue-600 dark:text-blue-400 mb-6">Album Saya</h1>
            <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <div id="add-modal" class="fixed inset-0 z-50 hidden bg-black/60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl">
            <h2 class="text-xl font-bold mb-4">Buat Album Baru</h2>
            <input type="file" id="file-input" multiple accept="image/*,video/*" class="hidden" onchange="previewFiles()">
            <div onclick="document.getElementById('file-input').click()" class="border-2 border-dashed border-blue-200 p-6 rounded-2xl text-center cursor-pointer hover:bg-blue-50 transition">
                <i class="ph ph-upload-simple text-4xl text-blue-400"></i>
                <p class="text-sm mt-2 text-slate-500">Pilih foto/video sebanyak mungkin</p>
            </div>
            <textarea id="caption-input" class="w-full mt-4 p-3 bg-blue-50 dark:bg-slate-700 rounded-xl outline-none" placeholder="Ceritakan kenangan ini..."></textarea>
            <div class="flex gap-2 mt-4">
                <button onclick="saveMemory()" class="flex-1 bg-blue-500 text-white py-2 rounded-xl">Simpan</button>
                <button onclick="closeAddModal()" class="flex-1 bg-slate-200 dark:bg-slate-600 py-2 rounded-xl">Batal</button>
            </div>
        </div>
    </div>

    <script>
        let memories = [];
        
        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
        function openAddModal() { document.getElementById('add-modal').classList.remove('hidden'); }
        function closeAddModal() { document.getElementById('add-modal').classList.add('hidden'); }
        
        function showPage(page) {
            document.getElementById('content-home').classList.add('hidden');
            document.getElementById('content-gallery').classList.add('hidden');
            if (page === 'home') {
                document.getElementById('content-home').classList.remove('hidden');
            } else {
                document.getElementById('content-gallery').classList.remove('hidden');
                document.getElementById('page-title').innerText = page === 'albums' ? 'Album Saya' : 'Favorit';
                renderGallery();
            }
        }

        function previewFiles() { /* Logic for previewing files could be added here */ }

        function saveMemory() {
            const fileInput = document.getElementById('file-input');
            const files = fileInput.files;
            if (files.length === 0) return;
            
            const album = {
                id: Date.now(),
                files: Array.from(files).map(f => ({ url: URL.createObjectURL(f), name: f.name })),
                caption: document.getElementById('caption-input').value,
                date: new Date().toLocaleDateString()
            };
            memories.unshift(album);
            document.getElementById('album-count').innerText = memories.length;
            document.getElementById('caption-input').value = '';
            fileInput.value = '';
            renderGallery();
            closeAddModal();
        }

        function downloadFile(url, name) {
            const a = document.createElement('a');
            a.href = url;
            a.download = name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = memories.map(m => `
                <div class="bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-sm border border-blue-50 dark:border-slate-700">
                    <img src="${m.files[0].url}" class="w-full h-40 object-cover rounded-xl mb-3" alt="Album Cover">
                    <p class="font-semibold text-sm truncate">${m.caption || 'Tanpa judul'}</p>
                    <p class="text-[10px] text-blue-400 font-bold mb-3">${m.files.length} Item dalam album</p>
                    <div class="flex gap-2">
                        <button onclick="downloadFile('${m.files[0].url}', '${m.files[0].name}')" class="flex-1 text-xs bg-blue-50 dark:bg-slate-700 py-2 rounded-lg flex items-center justify-center gap-2">
                            <i class="ph ph-download-simple"></i> Download
                        </button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
